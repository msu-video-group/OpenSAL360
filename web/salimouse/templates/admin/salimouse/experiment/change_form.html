{% extends "admin/change_form.html" %}
{% load admin_urls %}

{% block object-tools-items %}
{{ block.super }}
<li>
    <a href="{% url opts|admin_urlname:'changelist' %}">Back</a>
</li>
{% if original %}
<li>
    <a href="{% url 'experiment' experiment_id=original.pk %}" target="_blank" rel="noopener">Preview experiment</a>
</li>
<li>
    <a href="{% url 'admin:salimouse_experiment_duplicate' original.pk %}">Duplicate experiment</a>
</li>
{% endif %}
{% endblock %}
