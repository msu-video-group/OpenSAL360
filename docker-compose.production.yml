services:
  db:
    image: postgres
    volumes:
      - ./app_data/postgres:/var/lib/postgresql
    env_file:
      - ./docker/.env

  web:
    build: ./docker/web
    command: ./entrypoint.sh
    env_file:
      - ./docker/.env
    environment:
      - DEBUG=False
    volumes:
      - ./web:/code
      - ./app_data/web_static:/web_static
    depends_on:
      - db

  nginx:
    image: nginx
    command: /entrypoint.sh

    volumes:
      - ./docker/nginx/entrypoint.sh:/entrypoint.sh:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web/static/experiment_video:/home/web/experiment_video
      - ./app_data/web_static:/home/web/static
      - ./app_data/certbot/conf:/etc/letsencrypt
      - ./app_data/certbot/www:/var/www/certbot

    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    depends_on:
      - web

  certbot:
    image: certbot/certbot
    entrypoint: /entrypoint.sh

    volumes:
      - ./docker/certbot/entrypoint.sh:/entrypoint.sh:ro
      - ./app_data/certbot/conf:/etc/letsencrypt
      - ./app_data/certbot/www:/var/www/certbot
    depends_on:
      - nginx
